<body>

<!-- Loading overlay -->
<div id="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text">正在載入知識庫...</div>
</div>

<div id="app">
  <div class="header">
    <div class="logo-row">
      <div class="logo">🧠</div>
      <div>
        <h1>SCM Disney Cruise 客服知識庫</h1>
        <div class="subtitle" id="subtitle">載入中...</div>
      </div>
    </div>
    <div class="tab-bar">
      <button class="tab-btn active" id="tab-classify" onclick="switchTab('classify')">🤖 訊息辨識</button>
      <button class="tab-btn" id="tab-browse" onclick="switchTab('browse')">📖 瀏覽知識庫</button>
    </div>
    <div class="lang-bar">
      <span class="lang-label">CS 回覆語言：</span>
      <button class="lang-btn active" id="lang-zh" onclick="setLang('zh')">🇹🇼 中文</button>
      <button class="lang-btn" id="lang-en" onclick="setLang('en')">🇬🇧 English</button>
      <button class="lang-btn" id="lang-ja" onclick="setLang('ja')">🇯🇵 日本語</button>
      <button class="lang-btn" id="lang-ko" onclick="setLang('ko')">🇰🇷 한국어</button>
    </div>
  </div>

  <div id="classify-pane" class="pane">
    <div class="input-card">
      <p class="hint-text">貼上客人或 CS 的訊息（中文、英文、日文、韓文皆可），自動辨識問題類型並帶出 OP 作業 &amp; CS 回覆</p>
      <textarea id="msg-input" placeholder="貼上訊息內容..." oninput="onInputChange()"></textarea>
      <div class="btn-row">
        <button class="primary-btn" id="match-btn" disabled onclick="doMatch()">⚡ 辨識並帶出回覆</button>
        <button class="secondary-btn" id="clear-btn" style="display:none" onclick="clearAll()">清除</button>
      </div>
    </div>
    <div id="results-area"></div>
  </div>

  <div id="browse-pane" class="pane" style="display:none">
    <input type="text" id="search-box" placeholder="🔍 搜尋情境、關鍵字、回覆內容..." oninput="onSearch()">
    <div id="browse-area"></div>
  </div>
</div>

<script>
// ─── Data source ───────────────────────────────────────────────────────────
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRNrhyhY3IbegfYIgmd6QrQtxsHeUyJDiXKcJU2pvlPHhdm_TG3258nYhDyb4M__g/pub?gid=1087114810&single=true&output=csv';

// ─── Language state ────────────────────────────────────────────────────────
let currentLang = 'zh';

function setLang(lang) {
  currentLang = lang;
  ['zh','en','ja','ko'].forEach(l => {
    document.getElementById('lang-' + l).classList.toggle('active', l === lang);
  });
  // Re-render any visible cards
  if (document.getElementById('results-area').innerHTML) doMatch();
  if (document.getElementById('browse-pane').style.display !== 'none') renderBrowse();
}

"APP顯示航空旅行稅（Air Travel Taxes）":"このご予約を詳しく確認いたしました。Navigator Appに表示されている情報についてご説明します。ディズニークルーズラインからは航空旅行税（Air Travel Taxes）は一切請求されておりません。アプリにこの項目が表示されているのは、予約に独立したフライト情報（台北〜シンガポール）が追加されているためです。「Air Travel Taxes」はシステムがフライトデータに基づいて自動表示する項目であり、実際の追加料金を意味するものでも、クルーズ料金に影響するものでもありません。その他ご不明な点がございましたら、お気軽にお問い合わせください。",
"APP顯示旅客人數不符":"こんにちは、ご予約の旅客情報を確認中です。できる限り早急に処理してご連絡いたします。しばらくお待ちください。よろしくお願いいたします。",
"無法進行線上Check-in":"こんにちは、現在ディズニークルーズラインのオンラインチェックイン機能はまだ開放されていません。開放後は通常通り操作できます。しばらくお待ちください。よろしくお願いいたします。",
"APP內預訂/訂餐功能問題":"こんにちは、シャトルサービスが必要な場合はお知らせください。ご予約いたします。レストラン、船内アクティビティ、誕生日などの特別なご要望は、Disney Cruise Appから直接ご予約ください。よろしくお願いいたします。",
"線上報到顯示未付款":"こんにちは、これはディズニークルーズラインのオンラインチェックイン機能がまだ開放されていないための正常な表示であり、支払いの問題ではありません。開放後は正常に操作できます。どうぞご安心ください。",
"報到照片/護照上傳問題":"こんにちは、パスポート写真のアップロードに関するご質問は、ディズニークルーズラインのカスタマーサービスに直接お問い合わせください。よろしくお願いいたします。",
"催一般處理進度":"こんにちは、お客様のご依頼は処理中です。進捗があり次第すぐにご連絡いたします。しばらくお待ちください。よろしくお願いいたします。",
"催憑證/確認信":"こんにちは、バウチャー/確認書をできる限り早急にお送りします。しばらくお待ちください。よろしくお願いいたします。",
"催資料修改進度":"こんにちは、データの修正は処理中です。ディズニー公式との確認が必要なため、お時間をいただいております。しばらくお待ちください。よろしくお願いいたします。",
"催問50%退款進度":"こんにちは、50%クレジット返金は処理中です。進捗があり次第すぐにご連絡いたします。しばらくお待ちください。よろしくお願いいたします。",
"提供新單設定申請折抵":"こんにちは、ご予約情報を受け取りました。できる限り早急に50%クレジットを処理いたします。よろしくお願いいたします。",
"詢問是否符合折抵資格":"こんにちは、新しいご予約の旅客の氏名と生年月日が以前のご予約と一致していれば、50%クレジットの対象となります。新しい予約番号をお知らせいただければ、確認・処理いたします。よろしくお願いいたします。",
"已上表/提交退款申請":"こんにちは、お申し込みを受け取りました。できる限り早急に処理いたします。よろしくお願いいたします。",
"退款金額有疑問":"こんにちは、返金額の詳細を確認中です。なお、港湾税などの関連費用は50%クレジットの対象外であるため、お客様が計算された金額と若干異なる場合があります。確認次第すぐにご連絡いたします。よろしくお願いいたします。",
"其他50%折抵問題":"こんにちは、50%クレジットに関するご質問を確認しております。確認次第すぐにご連絡いたします。よろしくお願いいたします。",
"修改國籍":"こんにちは、国籍情報を修正いたしました。よろしくお願いいたします。",
"其他資料修改（姓名/出生日期/護照/Email/性別）":"こんにちは、データ修正のご依頼を受け取りました。できる限り早急にディズニー公式に連絡して処理いたします。修正完了後はご確認のためご連絡いたします。よろしくお願いいたします。",
"詢問房號編碼":"こんにちは、お客様の客室番号コードは {客室番号コード} です。よろしくお願いいたします。",
"要求連通房/相鄰房":"こんにちは、できる限り隣接した客室番号を手配するよう努めますが、保証することはできません。最終的な手配はディズニー公式の配置に従います。よろしくお願いいたします。",
"指定房號位置偏好":"こんにちは、誠に申し訳ございませんが、客室の場所を指定することはできません。最終的な手配はディズニー公式の配置に従います。ご不便をおかけして申し訳ございません。",
"換房/換主題房":"こんにちは、誠に申し訳ございませんが、客室のテーマを指定または変更することはできません。ご不便をおかけして申し訳ございません。",
"其他房號問題":"こんにちは、客室に関する問題を確認し、できる限り早急にご連絡いたします。よろしくお願いいたします。",
"一般取消/退款申請":"こんにちは、このご予約は商品規定により取消・返金不可となっております。特別な事情がある場合は理由をご説明ください。柔軟な対応が可能かどうか確認するよう最善を尽くします。よろしくお願いいたします。",
"催退款進度":"こんにちは、返金は処理中です。進捗があり次第すぐにご連絡いたします。しばらくお待ちください。よろしくお願いいたします。",
"退款金額疑問/要明細":"こんにちは、返金額の詳細を確認中です。確認次第すぐにご連絡いたします。よろしくお願いいたします。",
"部分退款申請":"こんにちは、1名の旅客のみ個別取消が可能か、および関連費用について確認いたします。確認次第すぐにご連絡いたします。よろしくお願いいたします。",
"特殊原因取消（家庭/健康）":"こんにちは、ご状況をお聞きし、大変残念に思います。関連する証明書類をご提出いただければ、柔軟な対応を最大限模索いたします。よろしくお願いいたします。",
"取消後重新訂購":"こんにちは、取消処理を完了いたしました。再予約をご希望の場合は、新しい注文を行い、新しい注文番号をお知らせください。後続の処理を行います。よろしくお願いいたします。",
"重複預訂/訂錯取消":"こんにちは、重複予約であることを確認いたしました。できる限り早急にキャンセル処理を行います。よろしくお願いいたします。",
"詢問如何預訂接駁":"こんにちは、以下の場所からシャトルサービスをご利用いただけます：チャンギ空港、マリーナベイクルーズセンター、ハーバーフロントターミナル、マレーシア・ペナンクルーズターミナル。以下をご提供ください：1.乗車/降車場所 2.シャトル日程 3.片道または往復 4.人数。ご予約いたします。出発の3日前までにご予約ください。よろしくお願いいたします。",
"確認是否包含接駁服務":"こんにちは、ご予約プランにシャトルサービスが含まれているか確認し、できる限り早急にご連絡いたします。よろしくお願いいたします。",
"接駁時間查詢/更改":"こんにちは、シャトルサービスは午前10:30から開始されます。詳細なシャトル時間は出発の5〜7日前にメールでご連絡いたします。変更が必要な場合は出発の7日前までにお知らせください。期限を過ぎた場合は返金できませんのでご注意ください。よろしくお願いいたします。",
"兌換碼問題（過期/無法使用）":"こんにちは、ご利用のリデンプションコードの状況を確認し、できる限り早急に処理いたします。しばらくお待ちください。よろしくお願いいたします。",
"其他接駁問題":"こんにちは、シャトル費用は片道お一人様USD 23です。このご予約には追加差額が必要です。商品ページでお支払いいただき、注文時に元の注文番号をご記入ください。よろしくお願いいたします。\n補充リンク：https://www.kkday.com/zh-tw/product/579218",
"新增旅客（詢問可行性/費用）":"こんにちは、まず追加したい旅客のパスポート英語名、性別、国籍をご提供ください。ディズニー公式に追加可否と関連費用を確認し、確認次第すぐにご連絡いたします。よろしくお願いいたします。",
"升等艙房":"こんにちは、誠に申し訳ございませんが、現在客室のアップグレードは承っておりません。ご不便をおかけして申し訳ございません。",
"減少人數":"こんにちは、旅客数の削減が可能か、および関連費用について確認いたします。確認次第すぐにご連絡いたします。よろしくお願いいたします。",
"攜帶酒精上船":"こんにちは、21歳以上のお客様は、1航程および各寄港地につき、未開封のワインまたはスパークリングワイン（750ml以下）を最大2本、またはビール（12oz以下）を最大6缶、手荷物として持ち込むことができます。レストランでお飲みになる場合は、1本あたりUSD 29のコルク代が必要です。なお、預け入れ荷物内のアルコールは没収され、返金されませんのでご注意ください。よろしくお願いいたします。",
"攜帶食物/飲料上船":"こんにちは、工場密封された日持ちのするスナックは持ち込み可能ですが、母港に戻る前に食べきるか未開封のままにしておく必要があります。手作り食品、開封済み食品、要冷蔵食品、炊飯器やコーヒーメーカーなどの電化製品は禁止されています。ベビーフードや食事制限に関連する食品は、12インチ以下のクーラーバッグ（機内持ち込み荷物）に入れることができます。よろしくお願いいたします。",
"電器攜帶限制":"こんにちは、ほとんどの電化製品は船内への持ち込みが禁止されています。禁止品：炊飯器、コーヒーメーカー、電気ケトル、電気アイロン、延長コード/電源タップ、ミキサーなど。持込可能品：ヘアドライヤー（最大220V/2000W、客室内にも備え付け）、カールアイロン/ヘアアイロン、電気シェーバー。禁止電化製品がセキュリティチェックで発見された場合は没収され、荷物の遅延が深夜まで続く可能性がありますのでご注意ください。よろしくお願いいたします。",
"船上吸煙政策":"こんにちは、船内での喫煙（電子タバコを含む）は指定の喫煙エリアのみで許可されています。客室やバルコニーでの喫煙は禁止されています。客室やバルコニーで喫煙が発見された場合、USD 250のクリーニング料金が請求されます（エアフィルター、カーペット、寝具の交換費用を含む）。詳細な喫煙エリアの場所は乗船後にスタッフにお尋ねください。よろしくお願いいたします。",
"船上消費方式":"こんにちは、船内でのすべての消費（お食事、アクティビティ、ショップなど）はお部屋のアカウントに計上されます。船内では現金は不要で、最終日の下船前に一括精算できます。乗船時にお部屋のアカウントにクレジットカードを登録されることをお勧めします。よろしくお願いいたします。",
"特殊膳食/食物過敏申請":"こんにちは、ディズニークルーズラインではグルテンフリー、ベジタリアン、砂糖不使用、乳製品不使用などの特別食を提供しています。ディズニークルーズラインにログインして「マイ予約」→「特別リクエスト」からご要望をご提出ください：一般的な食事制限は出発の少なくとも3日前；コーシャまたはハラール食は少なくとも5週間前；過越節食は少なくとも10週間前に電話で申請してください。乗船後も毎回注文時にアレルギーや食事制限をサーバーにお伝えください。よろしくお願いいたします。",
"特殊場合安排（生日/蜜月/紀念日）":"こんにちは、誕生日、新婚旅行、記念日、婚約などの特別な機会がある場合は、ディズニークルーズラインの予約に備考を記入してください。",
"帶嬰兒/幼兒同行":"こんにちは、乳幼児連れの旅行に関する情報：1. ベビーカーは持ち込み可能ですが、廊下や公共エリアへの駐車は禁止です。折りたたみ式の軽量タイプをお勧めします。2. ベビーベッド（Pack'n Play）は「マイ予約→特別リクエスト」から無料申請できます（在庫次第）。3. おむつ、哺乳瓶、ベビーシャンプーなどの基本用品は船内ショップで購入できます。4. 母乳は機内持ち込み荷物として運べます。その他ご要望がある場合はお知らせください。よろしくお願いいたします。",
"自行前往港口（捷運/計程車）":"こんにちは、シンガポール・マリーナベイクルーズセンターへのアクセス方法：\n1. MRT：南北線（レッドライン）の終点NS28マリーナサウスピア駅まで乗車し、案内に従って徒歩約5〜10分（約500〜600メートル）で到着です。\n2. タクシー：出発地によりますが、USD 15〜30程度です。\nディズニー公式シャトルサービス（片道USD 23/人）をご希望の場合は、お知らせいただければご予約をお手伝いします。よろしくお願いいたします。",
"兩/多筆同行單想綁定一起":"こんにちは、2つの予約のリンクが完了しました。ディズニークルーズラインアプリにログインしてご確認ください。",
"連通房需求":"こんにちは、コネクティングルームのご要望について、代わりに備考として記入いたしました。ただし、実際の手配は船の最終設定によりますので、保証することはできません。ご不便をおかけして誠に申し訳ございません。",
"合作飯店旅客詢問優先登船接駁":"こんにちは！お問い合わせありがとうございます。ディズニークルーズラインは一部のシンガポールのホテルと提携しております。提携ホテルにご宿泊のお客様が公式シャトルサービスをご予約いただくと、優先乗船の特典をご利用いただけます。シャトル料金は片道お一人様USD 23です。ご予約をご希望の場合は、ご宿泊のホテル名とシャトルが必要な日付をお知らせください。できる限り早急に手配いたします。よろしくお願いいたします。"
},
ko: {

"APP/官網找不到設定":"안녕하세요, 설정 정보가 디즈니 크루즈 라인 앱에 동기화되기까지 약 1~3 영업일이 소요됩니다. 그때까지도 로그인이 되지 않으시면 다시 알려주시면 확인해 드리겠습니다. 또한 바우처의 확인 번호가 올바른지도 확인해 주세요. 감사합니다.",
"超過30天仍找不到設定":"안녕하세요, 오래 기다리게 해드려서 진심으로 죄송합니다. 디즈니 공식 측에 긴급 연락하여 예약 설정을 확인 중이며, 결과가 나오는 즉시 알려드리겠습니다. 불편을 드려 죄송합니다.",
"登入顯示尚未付清款項":"안녕하세요, 이 메시지는 디즈니 크루즈 라인 측에서 아직 온라인 체크인이 열리지 않아 표시되는 것으로, 요금이나 결제와는 전혀 관계가 없습니다. 안심하시기 바랍니다. 이해해 주셔서 감사합니다.",
"APP上旅客資料顯示錯誤":"안녕하세요, 탑승객 정보 수정 요청을 접수했습니다. 최대한 빨리 처리해 드리겠습니다. 데이터 수정은 출발 30일 전까지 제출해야 함을 참고해 주세요. 감사합니다.",
"APP顯示航空旅行稅（Air Travel Taxes）":"이 예약을 자세히 검토하였으며, Navigator App에 표시된 정보에 대해 설명드리겠습니다. 디즈니 크루즈 라인에서는 항공 여행세(Air Travel Taxes)를 추가로 청구하지 않으니 안심하세요. 앱에 이 항목이 표시되는 것은 예약에 별도의 항공편 정보(타이베이~싱가포르)가 추가되었기 때문입니다. 이 항목은 실제 추가 요금을 의미하지 않으며 크루즈 요금에도 영향을 미치지 않습니다. 추가 문의 사항은 언제든지 연락해 주세요.",
"APP顯示旅客人數不符":"안녕하세요, 현재 예약의 탑승객 정보를 확인 중입니다. 최대한 빨리 처리하여 알려드리겠습니다. 잠시 기다려 주세요. 감사합니다.",
"無法進行線上Check-in":"안녕하세요, 현재 디즈니 크루즈 라인의 온라인 체크인 기능이 아직 열리지 않았습니다. 열리면 정상적으로 이용하실 수 있습니다. 잠시 기다려 주세요. 감사합니다.",

"連通房需求":"안녕하세요, 커넥팅룸 요청에 대해 대신 메모를 남겨드렸습니다. 그러나 실제 배정은 선박의 최종 구성에 따라 달라지므로 보장할 수 없습니다. 불편을 드려 죄송합니다.",

function getCSReply(sub) {
  if (currentLang === 'zh') return sub.cs_reply;
  // Check if sheet has translation columns
  const fromSheet = sub['cs_reply_' + currentLang];
  if (fromSheet) return fromSheet;
  // Fall back to embedded translations
  return (TRANS[currentLang] && TRANS[currentLang][sub.name]) || sub.cs_reply;
}

function hashColor(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) h = Math.imul(31, h) + str.charCodeAt(i) | 0;
  const palette = ['#6366f1','#8b5cf6','#ec4899','#ef4444','#f97316','#f59e0b','#10b981','#3b82f6','#06b6d4','#84cc16'];
  return palette[Math.abs(h) % palette.length];
}

const PAX_SIGNALS = [
  "date of birth","dob","be corrected","be updated","be amended","corrected and updated",
  "birthday","passport update","passport renew","name incorrect","name wrong","name correct",
  "name change","name update","name amend","name typo","name fix","please change",
  "please update","please correct","please fix","entered incorrectly","can we change",
  "can you change","is it possible to change","出生日期","出生年","生日","護照",
  "修改","更改","更正","修正","名字","姓名","first name","last name","surname",
  "填錯","寫錯","typo"
];

// ─── Mutable app state ────────────────────────────────────────────────────
let KB = { categories: [] };
let allSubs = [];
const subMap = {};
let currentResults = [];
let expandedCat = null;
let expandedSub = null;

// ─── CSV Parser ────────────────────────────────────────────────────────────
function parseCSV(raw) {
  const text = raw.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  const rows = [];
  let row = [];
  let field = '';
  let inQuotes = false;

  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    const next = text[i + 1];

    if (inQuotes) {
      if (c === '"' && next === '"') { field += '"'; i++; }
      else if (c === '"')           { inQuotes = false; }
      else                          { field += c; }
    } else {
      if      (c === '"') { inQuotes = true; }
      else if (c === ',') { row.push(field); field = ''; }
      else if (c === '\n') {
        row.push(field);
        if (row.some(f => f.trim())) rows.push(row);
        row = []; field = '';
      } else {
        field += c;
      }
    }
  }
  row.push(field);
  if (row.some(f => f.trim())) rows.push(row);
  return rows;
}

// ─── Build KB from CSV rows ───────────────────────────────────────────────
// Columns: 0:分類 1:情境 2:案件數 3:關鍵字 4:OP作業 5:OP告知CS 6:CS中文回覆 7:備注
//          8:CS英文回覆(optional) 9:CS日文回覆(optional) 10:CS韓文回覆(optional)
function buildKBFromCSV(rows) {
  const catMap = new Map();
  const catOrder = [];

  for (let i = 1; i < rows.length; i++) {
    const r = rows[i];
    if (!r || r.length < 7) continue;

    const catName = (r[0] || '').trim();
    const subName = (r[1] || '').trim();
    if (!catName || !subName) continue;

    const cases    = parseInt(r[2]) || 0;
    const keywords = (r[3] || '').split('\n').map(k => k.trim()).filter(Boolean);
    const op_action = (r[4] || '').trim();
    const op_to_cs  = (r[5] || '').trim();
    const cs_reply  = (r[6] || '').trim();
    const notes     = (r[7] || '').trim();
    const cs_reply_en = (r[8] || '').trim();
    const cs_reply_ja = (r[9] || '').trim();
    const cs_reply_ko = (r[10] || '').trim();

    if (!catMap.has(catName)) {
      const catId = 'cat_' + catOrder.length;
      catMap.set(catName, { id: catId, name: catName, total_cases: 0, subcategories: [] });
      catOrder.push(catName);
    }
    const cat = catMap.get(catName);
    const subId = cat.id + '_sub_' + cat.subcategories.length;
    cat.total_cases += cases;
    cat.subcategories.push({ id: subId, name: subName, cases, keywords, op_action, op_to_cs, cs_reply, notes, cs_reply_en, cs_reply_ja, cs_reply_ko });
  }

  return { categories: catOrder.map(n => catMap.get(n)) };
}

// ─── Match engine ─────────────────────────────────────────────────────────
function matchMsg(msg) {
  if (!msg || !msg.trim()) return [];
  const m = msg.toLowerCase();
  const results = [];
  const isPaxChange = PAX_SIGNALS.some(s => m.includes(s.toLowerCase()));

  KB.categories.forEach(cat => {
    cat.subcategories.forEach(sub => {
      let score = 0;
      const matched = [];

      sub.keywords.forEach(kw => {
        const kwL = kw.toLowerCase();
        let ok = false;
        if (kwL.includes('.*')) {
          try { ok = new RegExp(kwL, 'i').test(m); } catch(e) { ok = m.includes(kwL); }
        } else {
          ok = m.includes(kwL);
        }
        if (ok) {
          score += kw.length > 10 ? 3 : kw.length > 5 ? 2 : 1;
          matched.push(kw);
        }
      });

      if (isPaxChange && sub.name.includes('其他資料修改')) score += 15;
      if (isPaxChange && sub.name.includes('修改國籍') && (m.includes('國籍') || m.includes('nationality'))) score += 20;
      if (isPaxChange && sub.name.includes('催一般')) score = Math.max(0, score - 10);

      if (score > 0) results.push(Object.assign({}, sub, { catName: cat.name, catId: cat.id, score, matched }));
    });
  });

  results.sort((a, b) => b.score - a.score);
  return results;
}

// ─── Helpers ──────────────────────────────────────────────────────────────
function esc(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function catColor(name) { return CC[name] || hashColor(name); }
function catIcon(name)  { return CI[name] || '📌'; }

// ─── Render card ──────────────────────────────────────────────────────────
function cardHTML(sub, ridx) {
  const c    = catColor(sub.catName);
  const icon = catIcon(sub.catName);
  const ref  = ridx !== undefined ? 'data-ridx="' + ridx + '"' : 'data-subid="' + sub.id + '"';
  const matchedStr  = (sub.matched && sub.matched.length > 0)
    ? '<span class="matched-kws">命中: ' + esc(sub.matched.slice(0, 4).join(', ')) + '</span>' : '';
  const bestBadge   = (ridx === 0) ? '<span class="badge-best">最佳匹配</span>' : '';
  const notesHtml   = sub.notes ? '<div class="notes-box">⚠️ ' + esc(sub.notes) + '</div>' : '';

  const csReply = getCSReply(sub);
  const langLabels = {zh:'🔵 CS 對客回覆（中文）', en:'🔵 CS Reply (English)', ja:'🔵 CS 返信（日本語）', ko:'🔵 CS 답변（한국어）'};
  const csLabel = langLabels[currentLang] || '🔵 CS 對客回覆';

  const opToCs = sub.op_to_cs ? `
    <div class="card-section">
      <div class="section-row">
        <span class="section-label" style="color:#10b981">🟢 OP 告知給 CS</span>
        <button class="copy-btn" ${ref} data-field="op_to_cs">📋 複製</button>
      </div>
      <div class="section-body" style="background:rgba(16,185,129,0.08);color:#6ee7b7">${esc(sub.op_to_cs).replace(/\n/g, '<br>')}</div>
    </div>` : '';

  return `
    <div class="result-card" style="border-left:3px solid ${c}">
      ${bestBadge}
      <div class="card-header">
        <span class="cat-badge" style="color:${c};background:${c}22;border:1px solid ${c}44">${icon} ${esc(sub.catName)}</span>
        <span class="sub-name">${esc(sub.name)}</span>
        ${matchedStr}
      </div>
      <div class="card-section">
        <div class="section-row">
          <span class="section-label" style="color:#a855f7">🔴 OP 下一步作業</span>
          <button class="copy-btn" ${ref} data-field="op_action">📋 複製</button>
        </div>
        <div class="section-body" style="background:rgba(139,92,246,0.08);color:#d8b4fe">${esc(sub.op_action).replace(/\n/g, '<br>')}</div>
      </div>
      ${opToCs}
      <div class="card-section">
        <div class="section-row">
          <span class="section-label" style="color:#3b82f6">${csLabel}</span>
          <button class="copy-btn" ${ref} data-field="cs_reply_current">📋 複製</button>
        </div>
        <div class="section-body" style="background:rgba(59,130,246,0.08);color:#93c5fd">${esc(csReply).replace(/\n/g, '<br>')}</div>
      </div>
      ${notesHtml}
    </div>`;
}

// ─── Tab ──────────────────────────────────────────────────────────────────
function switchTab(t) {
  document.getElementById('classify-pane').style.display = t === 'classify' ? 'block' : 'none';
  document.getElementById('browse-pane').style.display   = t === 'browse'   ? 'block' : 'none';
  document.getElementById('tab-classify').className = 'tab-btn' + (t === 'classify' ? ' active' : '');
  document.getElementById('tab-browse').className   = 'tab-btn' + (t === 'browse'   ? ' active' : '');
  if (t === 'browse') renderBrowse();
}

// ─── Classify ─────────────────────────────────────────────────────────────
function onInputChange() {
  const v = document.getElementById('msg-input').value;
  document.getElementById('match-btn').disabled = !v.trim();
  if (!v.trim()) {
    document.getElementById('results-area').innerHTML = '';
    document.getElementById('clear-btn').style.display = 'none';
  }
}
function clearAll() {
  document.getElementById('msg-input').value = '';
  document.getElementById('results-area').innerHTML = '';
  document.getElementById('match-btn').disabled = true;
  document.getElementById('clear-btn').style.display = 'none';
  currentResults = [];
}
function doMatch() {
  const msg = document.getElementById('msg-input').value;
  currentResults = matchMsg(msg);
  const area = document.getElementById('results-area');
  document.getElementById('clear-btn').style.display = 'inline-block';
  if (currentResults.length === 0) {
    area.innerHTML = '<div class="no-results">⚠️ 未匹配到已知情境，可能需要新增至知識庫。</div>';
    return;
  }
  const top = currentResults.slice(0, 3);
  let html = currentResults.length > 1
    ? '<div class="result-info">找到 ' + currentResults.length + ' 個匹配，顯示前 ' + top.length + ' 個</div>' : '';
  top.forEach((r, i) => { html += cardHTML(r, i); });
  area.innerHTML = html;
}

// ─── Browse ───────────────────────────────────────────────────────────────
function renderBrowse() {
  const q    = (document.getElementById('search-box').value || '').trim().toLowerCase();
  const area = document.getElementById('browse-area');

  if (q) {
    const filtered = allSubs.filter(s =>
      s.name.toLowerCase().includes(q) ||
      s.op_action.toLowerCase().includes(q) ||
      s.cs_reply.toLowerCase().includes(q) ||
      s.catName.toLowerCase().includes(q) ||
      s.keywords.some(k => k.toLowerCase().includes(q))
    );
    if (filtered.length === 0) {
      area.innerHTML = '<div class="no-results">找不到相關內容</div>';
      return;
    }
    let html = '<div class="search-count">搜尋結果：' + filtered.length + ' 個情境</div>';
    filtered.forEach(s => {
      const c = catColor(s.catName);
      const isOpen = expandedSub === s.id;
      html += `<div class="search-result-row" style="border-left:3px solid ${c}" onclick="toggleSearchSub('${s.id}')">
        <div class="sr-inner">
          <span class="cat-badge" style="color:${c};background:${c}22;border:1px solid ${c}44">${catIcon(s.catName)} ${esc(s.catName)}</span>
          <span class="sub-label">${esc(s.name)}</span>
          <span class="sr-meta">${s.cases}筆 ${isOpen ? '▼' : '▶'}</span>
        </div>
        ${isOpen ? '<div class="sub-detail" onclick="event.stopPropagation()">' + cardHTML(s) + '</div>' : ''}
      </div>`;
    });
    area.innerHTML = html;
  } else {
    let html = '';
    KB.categories.forEach(cat => {
      const c = catColor(cat.name);
      const isOpen = expandedCat === cat.id;
      let subsHtml = '';
      if (isOpen) {
        cat.subcategories.forEach(sub => {
          const subOpen = expandedSub === sub.id;
          subsHtml += `<div class="sub-row" onclick="event.stopPropagation();toggleSub('${sub.id}')">
            <div class="sub-inner">
              <span class="sub-label">${esc(sub.name)}</span>
              <span class="sub-meta">${sub.cases}筆 ${subOpen ? '▼' : '▶'}</span>
            </div>
            ${subOpen ? '<div class="sub-detail" onclick="event.stopPropagation()">' + cardHTML(Object.assign({}, sub, {catName: cat.name, catId: cat.id})) + '</div>' : ''}
          </div>`;
        });
      }
      html += `<div style="margin-bottom:6px">
        <div class="cat-row" style="border-left:3px solid ${c}" onclick="toggleCat('${cat.id}')">
          <div class="cat-inner">
            <span class="cat-icon">${catIcon(cat.name)}</span>
            <span class="cat-name">${esc(cat.name)}</span>
            <span class="cat-count" style="color:${c}">${cat.total_cases}筆</span>
            <span class="cat-meta">${cat.subcategories.length}個情境 ${isOpen ? '▼' : '▶'}</span>
          </div>
        </div>
        ${isOpen ? '<div class="sub-list">' + subsHtml + '</div>' : ''}
      </div>`;
    });
    area.innerHTML = html;
  }
}
function toggleCat(id) { expandedCat = expandedCat === id ? null : id; expandedSub = null; renderBrowse(); }
function toggleSub(id) { expandedSub = expandedSub === id ? null : id; renderBrowse(); }
function toggleSearchSub(id) { expandedSub = expandedSub === id ? null : id; renderBrowse(); }
function onSearch() { expandedCat = null; expandedSub = null; renderBrowse(); }

// ─── Copy (event delegation) ──────────────────────────────────────────────
document.addEventListener('click', function(e) {
  const btn = e.target.closest('.copy-btn');
  if (!btn) return;
  e.stopPropagation();
  const field = btn.dataset.field;
  let text = '';
  if (btn.dataset.ridx !== undefined) {
    const r = currentResults[parseInt(btn.dataset.ridx)];
    if (r) text = field === 'cs_reply_current' ? getCSReply(r) : (r[field] || '');
  } else if (btn.dataset.subid) {
    const s = subMap[btn.dataset.subid];
    if (s) text = field === 'cs_reply_current' ? getCSReply(s) : (s[field] || '');
  }
  if (!text) return;
  navigator.clipboard.writeText(text).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
  });
  btn.textContent = '✅ 已複製';
  btn.classList.add('copied');
  setTimeout(() => { btn.textContent = '📋 複製'; btn.classList.remove('copied'); }, 1500);
});

// ─── Initialise ───────────────────────────────────────────────────────────
async function fetchWithRetry(url, attempts) {
  let lastErr;
  for (let i = 0; i < attempts; i++) {
    try {
      const controller = new AbortController();
      const tid = setTimeout(() => controller.abort(), 12000);
      const resp = await fetch(url + (url.includes('?') ? '&' : '?') + '_t=' + Date.now(), {
        cache: 'no-store',
        signal: controller.signal
      });
      clearTimeout(tid);
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      return await resp.text();
    } catch (e) {
      lastErr = e;
      if (i < attempts - 1) await new Promise(r => setTimeout(r, 1500));
    }
  }
  throw lastErr;
}

async function init() {
  const loadingText = document.getElementById('loading-text');
  try {
    loadingText.textContent = '正在從 Google Sheets 載入最新知識庫...';
    const raw = await fetchWithRetry(SHEET_URL, 3);
    loadingText.textContent = '解析資料中...';
    const rows = parseCSV(raw);
    KB = buildKBFromCSV(rows);

    allSubs.length = 0;
    Object.keys(subMap).forEach(k => delete subMap[k]);
    KB.categories.forEach(cat => {
      cat.subcategories.forEach(sub => {
        const item = Object.assign({}, sub, { catName: cat.name, catId: cat.id });
        allSubs.push(item);
        subMap[sub.id] = item;
      });
    });

    document.getElementById('subtitle').textContent =
      allSubs.length + ' 個情境 · 中英日韓辨識 · 多語言回覆';

    const overlay = document.getElementById('loading-overlay');
    overlay.classList.add('hidden');
    setTimeout(() => { overlay.style.display = 'none'; }, 420);

    renderBrowse();

  } catch (err) {
    loadingText.innerHTML = `
      <div class="error-box">
        ❌ 無法載入知識庫資料<br>
        <small style="color:#94a3b8;font-size:11px">${esc(err.message)}</small><br>
        <small style="color:#64748b;font-size:11px">請確認網路連線正常，或 Google Sheets 已「發布到網路」</small><br>
        <button class="retry-btn" onclick="init()">🔄 重新載入</button>
      </div>`;
  }
}

init();
</script>
